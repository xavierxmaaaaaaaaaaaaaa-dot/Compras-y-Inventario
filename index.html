<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>AlviKid — Compras & Inventario</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand:       #1B6CA8;
      --brand-dark:  #134F7D;
      --brand-light: #E8F2FA;
      --accent:      #F59E0B;
      --success:     #10B981;
      --error:       #EF4444;
      --bg:          #F0F4F8;
      --surface:     #FFFFFF;
      --border:      #D1DCE8;
      --text:        #1A2B3C;
      --muted:       #607080;
      --radius:      14px;
      --shadow:      0 2px 12px rgba(27,108,168,0.10);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      padding-bottom: 32px;
    }

    header {
      background: var(--brand);
      padding: 18px 20px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(27,108,168,0.25);
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    header h1 { color: #fff; font-size: 17px; font-weight: 700; line-height: 1.2; }
    header p  { color: rgba(255,255,255,0.7); font-size: 12px; }

    .tab-bar {
      display: flex;
      background: var(--surface);
      border-bottom: 1.5px solid var(--border);
      position: sticky;
      top: 72px;
      z-index: 99;
    }
    .tab-btn {
      flex: 1;
      padding: 13px 8px;
      border: none;
      background: none;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border-bottom: 3px solid transparent;
      transition: color .2s, border-color .2s;
    }
    .tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

    main { padding: 20px 16px; max-width: 480px; margin: 0 auto; }
    .panel { display: none; }
    .panel.active { display: block; }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px 18px;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .badge {
      font-size: 11px; font-weight: 600;
      padding: 3px 8px; border-radius: 20px;
      background: var(--brand-light); color: var(--brand);
    }
    .badge.inv { background: #FEF3C7; color: #92400E; }

    .form-group { margin-bottom: 14px; }
    label {
      display: block;
      font-size: 12px; font-weight: 600;
      color: var(--muted);
      text-transform: uppercase; letter-spacing: .5px;
      margin-bottom: 6px;
    }
    input, select {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: inherit; font-size: 15px;
      color: var(--text);
      background: #FAFCFE;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      appearance: none; -webkit-appearance: none;
    }
    input:focus, select:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(27,108,168,.12);
      background: #fff;
    }
    input::placeholder { color: #A8BAC8; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }

    .select-wrap { position: relative; }
    .select-wrap::after {
      content: '▾';
      position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted); pointer-events: none; font-size: 14px;
    }

    .btn {
      width: 100%; padding: 15px; border: none; border-radius: 12px;
      font-family: inherit; font-size: 15px; font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: opacity .2s, transform .1s;
      margin-top: 6px;
    }
    .btn:active { transform: scale(.98); }
    .btn-primary { background: var(--brand); color: #fff; }
    .btn-primary:disabled { opacity: .55; cursor: not-allowed; }
    .btn-inv { background: var(--accent); color: #fff; }
    .btn-inv:disabled { opacity: .55; cursor: not-allowed; }

    #toast-wrap {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      display: flex; flex-direction: column; gap: 8px;
      pointer-events: none;
      width: calc(100% - 32px); max-width: 420px;
    }
    .toast {
      border-radius: 12px; padding: 13px 16px;
      font-size: 14px; font-weight: 500;
      display: flex; align-items: center; gap: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,.18);
      animation: slideUp .3s ease;
      pointer-events: auto;
    }
    .toast.ok      { background: var(--success); color: #fff; }
    .toast.err     { background: var(--error);   color: #fff; }
    .toast.loading { background: #1A2B3C;         color: #fff; }
    @keyframes slideUp {
      from { opacity:0; transform: translateY(20px); }
      to   { opacity:1; transform: translateY(0); }
    }

    .history-title {
      font-size: 12px; font-weight: 700;
      color: var(--muted);
      text-transform: uppercase; letter-spacing: .6px;
      margin-bottom: 10px;
    }
    .history-list { display: flex; flex-direction: column; gap: 8px; }
    .history-item {
      background: var(--brand-light);
      border-radius: 10px; padding: 10px 14px;
      font-size: 13px; color: var(--text);
      border-left: 3px solid var(--brand);
    }
    .history-item.inv { background: #FEF3C7; border-left-color: var(--accent); }
    .history-item strong { display: block; font-weight: 600; margin-bottom: 2px; }
    .history-item span { color: var(--muted); font-size: 12px; }
    .empty-state { text-align: center; color: var(--muted); font-size: 13px; padding: 24px 0; }

    /* Info box */
    .info-box {
      background: #EFF6FF;
      border: 1px solid #BFDBFE;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 12px;
      color: #1E40AF;
      margin-bottom: 16px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

<header>
  <div class="logo-icon">📦</div>
  <div>
    <h1>AlviKid · Gestión</h1>
    <p>Compras e Inventario</p>
  </div>
</header>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('compra')" id="tab-compra">
    <span>🛒</span> Compra
  </button>
  <button class="tab-btn" onclick="switchTab('inventario')" id="tab-inventario">
    <span>📋</span> Inventario
  </button>
  <button class="tab-btn" onclick="switchTab('historial')" id="tab-historial">
    <span>📜</span> Historial
  </button>
</div>

<main>

  <!-- ══ PANEL: COMPRA ══ -->
  <div class="panel active" id="panel-compra">
    <div class="card">
      <div class="card-title">
        🛒 Registrar Compra
        <span class="badge">COMPRA</span>
      </div>

      <div class="form-group">
        <label>Comprador</label>
        <input type="text" id="c-comprador" placeholder="Nombre del comprador" autocomplete="off" />
      </div>
      <div class="form-group">
        <label>Producto</label>
        <input type="text" id="c-producto" placeholder="Descripción del producto" autocomplete="off" />
      </div>
      <div class="form-group">
        <label>Cantidad</label>
        <input type="number" id="c-cantidad" placeholder="0" min="0" step="1" inputmode="numeric" />
      </div>
      <div class="form-group">
        <label>Precio Total (Bs.)</label>
        <input type="number" id="c-precio" placeholder="0.00" min="0" step="0.01" inputmode="decimal" />
      </div>
      <div class="form-group">
        <label>Categoría</label>
        <div class="select-wrap">
          <select id="c-categoria">
            <option value="">— Seleccionar —</option>
            <option>Materiales eléctricos</option>
            <option>Equipos y herramientas</option>
            <option>Consumibles</option>
            <option>EPP / Seguridad</option>
            <option>Transporte / Logística</option>
            <option>Otros</option>
          </select>
        </div>
      </div>

      <button class="btn btn-primary" id="btn-compra" onclick="enviarCompra()">
        <span>✅</span> Registrar Compra
      </button>
    </div>
  </div>

  <!-- ══ PANEL: INVENTARIO ══ -->
  <div class="panel" id="panel-inventario">
    <div class="card">
      <div class="card-title">
        📋 Actualizar Inventario
        <span class="badge inv">INVENTARIO</span>
      </div>

      <div class="form-group">
        <label>Producto</label>
        <input type="text" id="i-producto" placeholder="Nombre del ítem" autocomplete="off" />
      </div>
      <div class="form-group">
        <label>Stock Actual</label>
        <input type="number" id="i-stock" placeholder="Cantidad en stock" min="0" step="1" inputmode="numeric" />
      </div>
      <div class="form-group">
        <label>Ubicación</label>
        <input type="text" id="i-ubicacion" placeholder="Ej: Almacén A, Estante 3" autocomplete="off" />
      </div>

      <button class="btn btn-inv" id="btn-inv" onclick="enviarInventario()">
        <span>🔄</span> Actualizar Stock
      </button>
    </div>
  </div>

  <!-- ══ PANEL: HISTORIAL ══ -->
  <div class="panel" id="panel-historial">
    <div class="card">
      <div class="history-title">Registros de esta sesión</div>
      <div class="history-list" id="history-list">
        <p class="empty-state">Aún no hay registros en esta sesión.</p>
      </div>
    </div>
  </div>

</main>

<div id="toast-wrap"></div>

<script>
  // ─── CONFIGURACIÓN ───────────────────────────────────────────────
  // El HTML envía tipo:"Compras" y tipo:"Inventario" (plural)
  // para que coincida exactamente con el nombre de las hojas en GAS.
  // El fetch usa ?tipo=... en la URL como parámetro GET adicional
  // y envía el body como texto plano (text/plain) para evitar el
  // preflight CORS que bloquea application/json en modo no-cors.
  const GAS_URL = "https://script.google.com/macros/s/AKfycbwrhuKUmuPMGaRrKAvSJ_7i4fmya8jQn2El6t-lqa53yfhn9xNm8rFzDg-qztG56foM3Q/exec";

  const sessionHistory = [];

  /* ── TABS ── */
  function switchTab(tab) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('panel-' + tab).classList.add('active');
    document.getElementById('tab-' + tab).classList.add('active');
  }

  /* ── TOAST ── */
  function toast(msg, type = 'ok') {
    const wrap = document.getElementById('toast-wrap');
    const el = document.createElement('div');
    el.className = 'toast ' + type;
    const icon = type === 'ok' ? '✅' : type === 'err' ? '❌' : '⏳';
    el.innerHTML = `<span>${icon}</span><span>${msg}</span>`;
    wrap.appendChild(el);
    setTimeout(() => {
      el.style.transition = 'opacity .3s';
      el.style.opacity = '0';
      setTimeout(() => el.remove(), 320);
    }, 3500);
  }

  /* ── HISTORIAL ── */
  function addHistory(tipo, datos) {
    sessionHistory.unshift({ tipo, datos, hora: new Date().toLocaleTimeString('es-BO', { hour: '2-digit', minute: '2-digit' }) });
    renderHistory();
  }

  function renderHistory() {
    const list = document.getElementById('history-list');
    if (!sessionHistory.length) {
      list.innerHTML = '<p class="empty-state">Aún no hay registros en esta sesión.</p>';
      return;
    }
    list.innerHTML = sessionHistory.slice(0, 20).map(r => {
      const isInv = r.tipo === 'Inventario';
      const detail = isInv
        ? `${r.datos.producto} — Stock: ${r.datos.stock} | ${r.datos.ubicacion}`
        : `${r.datos.producto} · ${r.datos.cantidad} u. · Bs. ${r.datos.precio} (${r.datos.categoria})`;
      return `<div class="history-item ${isInv ? 'inv' : ''}">
        <strong>${isInv ? '📋' : '🛒'} ${r.tipo} — ${r.datos.comprador || r.datos.producto}</strong>
        <span>${detail}</span>
        <span style="display:block;margin-top:2px;color:#A8BAC8">${r.hora}</span>
      </div>`;
    }).join('');
  }

  /* ── LOADING BUTTON ── */
  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    if (loading) {
      btn._orig = btn.innerHTML;
      btn.innerHTML = '<span>⏳</span> Enviando…';
    } else {
      btn.innerHTML = btn._orig;
    }
  }

  /* ── CORE: POST A GAS ────────────────────────────────────────────
     Solución al problema CORS con Google Apps Script:
     1. Enviamos Content-Type: text/plain (evita preflight OPTIONS)
     2. El body sigue siendo JSON válido — GAS lee e.postData.contents
     3. modo no-cors → respuesta opaca pero el GAS sí escribe en Sheet
  ─────────────────────────────────────────────────────────────────── */
  async function postToGAS(payload) {
    await fetch(GAS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },   // ← KEY FIX: evita preflight
      body: JSON.stringify(payload)
    });
    // Con no-cors la respuesta es opaca (no podemos leerla),
    // pero si no lanza excepción el fetch llegó al servidor.
    return true;
  }

  /* ── COMPRA ── */
  async function enviarCompra() {
    const comprador = document.getElementById('c-comprador').value.trim();
    const producto  = document.getElementById('c-producto').value.trim();
    const cantidad  = document.getElementById('c-cantidad').value.trim();
    const precio    = document.getElementById('c-precio').value.trim();
    const categoria = document.getElementById('c-categoria').value;

    if (!comprador || !producto || !cantidad || !precio || !categoria) {
      toast('Completa todos los campos', 'err');
      return;
    }

    // tipo: "Compras" (plural) → debe coincidir con el nombre de la hoja en GAS
    const payload = {
      tipo: 'Compras',
      comprador,
      producto,
      cantidad: Number(cantidad),
      precio: Number(precio),
      categoria
    };

    setLoading('btn-compra', true);
    toast('Enviando compra…', 'loading');

    try {
      await postToGAS(payload);
      addHistory('Compra', { comprador, producto, cantidad, precio, categoria });
      toast('Compra registrada en Google Sheets ✓');
      ['c-comprador','c-producto','c-cantidad','c-precio'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('c-categoria').value = '';
    } catch(e) {
      toast('Error de red. Verifica tu conexión.', 'err');
      console.error(e);
    } finally {
      setLoading('btn-compra', false);
    }
  }

  /* ── INVENTARIO ── */
  async function enviarInventario() {
    const producto  = document.getElementById('i-producto').value.trim();
    const stock     = document.getElementById('i-stock').value.trim();
    const ubicacion = document.getElementById('i-ubicacion').value.trim();

    if (!producto || !stock || !ubicacion) {
      toast('Completa todos los campos', 'err');
      return;
    }

    // tipo: "Inventario" → debe coincidir con el nombre de la hoja en GAS
    const payload = {
      tipo: 'Inventario',
      producto,
      stock: Number(stock),
      ubicacion
    };

    setLoading('btn-inv', true);
    toast('Actualizando inventario…', 'loading');

    try {
      await postToGAS(payload);
      addHistory('Inventario', { producto, stock, ubicacion });
      toast('Inventario actualizado en Google Sheets ✓');
      ['i-producto','i-stock','i-ubicacion'].forEach(id => document.getElementById(id).value = '');
    } catch(e) {
      toast('Error de red. Verifica tu conexión.', 'err');
      console.error(e);
    } finally {
      setLoading('btn-inv', false);
    }
  }
</script>
</body>
</html>
